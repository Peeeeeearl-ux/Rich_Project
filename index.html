<!DOCTYPE html>
<html lang="ko" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" id="themeColorMeta" content="#121212">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<title>내 포트폴리오</title>
<style>
  :root, :root[data-theme="dark"]{
    --bg:#121212;
    --surface:#181818;
    --surface2:#242424;
    --text:#FFFFFF;
    --text-secondary:#B3B3B3;
    --accent:#1DB954;
    --accent-contrast:#05130B;
    --border:#2A2A2A;
    --gain:#1DB954;
    --loss:#FF5C5C;
    --input-bg:#2A2A2A;
    --nav-bg:#000000;
    --sans: -apple-system, BlinkMacSystemFont, "Segoe UI", "Apple SD Gothic Neo", "Malgun Gothic", sans-serif;
    --mono: ui-monospace, "SF Mono", "Cascadia Code", Menlo, Consolas, monospace;
  }
  :root[data-theme="light"]{
    --bg:#FFFFFF;
    --surface:#F5F5F5;
    --surface2:#EBEBEB;
    --text:#121212;
    --text-secondary:#5E5E5E;
    --accent:#1DB954;
    --accent-contrast:#FFFFFF;
    --border:#E2E2E2;
    --gain:#188A43;
    --loss:#D6323E;
    --input-bg:#EDEDED;
    --nav-bg:#FFFFFF;
  }
  *{box-sizing:border-box;}
  html,body{
    margin:0;background:var(--bg);color:var(--text);
    font-family:var(--sans);min-height:100%;
    /* clip = 가로 넘침만 잘라내고 스크롤 컨테이너는 만들지 않음 (sticky/세로 스크롤 보존) */
    overflow-x:clip;
  }
  body{-webkit-tap-highlight-color:transparent;overscroll-behavior-y:none;}
  .up{color:var(--gain);} .down{color:var(--loss);}

  .app-shell{max-width:520px;margin:0 auto;min-height:100vh;position:relative;display:flex;flex-direction:column;}

  .topbar{
    position:sticky;top:0;z-index:20;background:var(--bg);
    padding:18px 20px 12px;font-size:22px;font-weight:800;letter-spacing:-0.3px;
  }

  .content{flex:1;padding:4px 16px calc(88px + env(safe-area-inset-bottom));}
  .tab-pane{display:none;}
  .tab-pane.active{display:block;animation:fadein .15s ease;}
  @keyframes fadein{from{opacity:0;} to{opacity:1;}}

  .summary{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:18px;}
  /* min-width:0 이 없으면 긴 monospace 숫자 때문에 셀이 줄지 못해 그리드가 화면 밖으로 밀림 */
  .summary .cell{background:var(--surface);border-radius:14px;padding:14px 12px;min-width:0;}
  .summary .label{font-size:10.5px;color:var(--text-secondary);letter-spacing:0.3px;margin-bottom:6px;}
  .summary .value{font-family:var(--mono);font-size:17px;font-weight:700;color:var(--text);overflow-wrap:anywhere;}
  @media (max-width:380px){
    .summary{grid-template-columns:1fr;}
    .topbar{font-size:20px;padding:16px 16px 10px;}
  }

  .card{background:var(--surface);border-radius:16px;padding:18px;margin-bottom:16px;}
  .card-title{font-size:13px;font-weight:700;color:var(--text-secondary);letter-spacing:0.4px;text-transform:uppercase;margin:0 0 14px;}
  .dial-legend-select{display:flex;justify-content:flex-end;margin-top:14px;}
  select.pill{
    font-family:var(--sans);font-size:12px;background:var(--input-bg);border:none;
    color:var(--text);border-radius:20px;padding:6px 12px;appearance:none;
  }
  .dial-table{width:100%;border-collapse:collapse;font-size:12.5px;margin-top:6px;table-layout:fixed;}
  .dial-table thead th{
    text-align:right;font-weight:600;color:var(--text-secondary);font-size:10px;
    letter-spacing:0.4px;text-transform:uppercase;padding:6px 4px;border-bottom:1px solid var(--border);
  }
  .dial-table thead th:first-child, .dial-table tbody td:first-child{text-align:left;}
  .dial-table thead th:nth-child(1), .dial-table tbody td:nth-child(1){width:48%;}
  .dial-table thead th:nth-child(2), .dial-table tbody td:nth-child(2){width:26%;}
  .dial-table thead th:nth-child(3), .dial-table tbody td:nth-child(3){width:26%;}
  .dial-table tbody td{padding:8px 4px;text-align:right;font-family:var(--mono);color:var(--text);border-bottom:1px solid var(--border);overflow:hidden;}
  .dial-table tbody td.up{color:var(--gain);}
  .dial-table tbody td.down{color:var(--loss);}
  .dial-table .tname{display:flex;align-items:center;gap:6px;font-family:var(--sans);font-weight:500;min-width:0;}
  .dial-table .tname-label{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;min-width:0;}
  .swatch{width:9px;height:9px;border-radius:50%;flex-shrink:0;}

  .ledger-head{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px;margin-bottom:10px;}
  .ledger-controls{display:flex;gap:6px;flex-wrap:wrap;}
  .table-scroll{overflow-x:auto;-webkit-overflow-scrolling:touch;border-radius:10px;}
  table{width:100%;border-collapse:collapse;font-size:12.5px;min-width:620px;}
  thead th{
    text-align:right;font-weight:600;color:var(--text-secondary);font-size:10.5px;
    letter-spacing:0.3px;text-transform:uppercase;padding:6px 6px;border-bottom:1px solid var(--border);
    background:var(--surface);
  }
  thead th:first-child, tbody td:first-child{text-align:left;position:sticky;left:0;background:var(--surface);z-index:2;}
  tbody td{padding:9px 6px;text-align:right;border-bottom:1px solid var(--border);font-family:var(--mono);color:var(--text);}
  .ticker-cell{font-family:var(--sans);font-size:13px;font-weight:700;position:relative;white-space:nowrap;}
  .ticker-cell .name{display:block;font-family:var(--sans);font-weight:400;font-size:10.5px;color:var(--text-secondary);}
  .edit-name-btn{background:none;border:none;cursor:pointer;color:var(--text-secondary);font-size:11px;margin-left:4px;padding:0;}
  .edit-name-btn:hover{color:var(--accent);}
  input.price-input{
    width:70px;font-family:var(--mono);font-size:12.5px;text-align:right;
    border:1px solid var(--border);border-radius:6px;padding:4px 6px;background:var(--input-bg);color:var(--text);
  }
  input.edit-input{width:60px;}
  .del-btn{font-family:var(--sans);font-size:11px;color:var(--loss);background:none;border:none;cursor:pointer;padding:0;}
  .pill-btn{
    font-family:var(--sans);font-size:11px;color:var(--text);background:var(--input-bg);
    border:none;border-radius:20px;padding:6px 12px;cursor:pointer;
  }
  .empty{padding:28px 4px;text-align:center;color:var(--text-secondary);font-size:13px;}

  .ticket h3{font-size:13px;font-weight:700;color:var(--text-secondary);letter-spacing:0.4px;text-transform:uppercase;margin:0 0 14px;}
  .ticket .row{display:flex;gap:8px;margin-bottom:8px;flex-wrap:wrap;}
  .ticket input,.ticket select{
    background:var(--input-bg);border:none;color:var(--text);
    padding:11px 12px;border-radius:10px;font-size:14px;font-family:var(--sans);flex:1;min-width:70px;
  }
  .ticket input::placeholder{color:var(--text-secondary);}
  button.submit{
    width:100%;padding:13px;background:var(--accent);border:none;border-radius:999px;
    color:var(--accent-contrast);font-weight:700;font-size:14px;cursor:pointer;margin-top:6px;
  }
  button.submit:active{transform:scale(0.98);}
  .radio-toggle{display:flex;gap:0;border-radius:10px;overflow:hidden;background:var(--input-bg);}
  .radio-toggle button{flex:1;padding:11px;background:transparent;border:none;color:var(--text-secondary);cursor:pointer;font-size:14px;font-weight:600;}
  .radio-toggle button.active-buy{background:var(--gain);color:#fff;}
  .radio-toggle button.active-sell{background:var(--loss);color:#fff;}

  .tx-row{
    display:flex;justify-content:space-between;font-family:var(--mono);font-size:12px;
    padding:9px 0;border-bottom:1px solid var(--border);color:var(--text);
  }
  .tx-row .tag{font-family:var(--sans);font-size:10px;padding:2px 8px;border-radius:10px;margin-right:6px;font-weight:600;}
  .tag.buy{background:rgba(29,185,84,0.18);color:var(--gain);}
  .tag.sell{background:rgba(255,92,92,0.18);color:var(--loss);}
  .tx-empty{color:var(--text-secondary);font-size:12px;padding:8px 0;}

  .theme-toggle{display:flex;gap:0;border-radius:10px;overflow:hidden;background:var(--input-bg);}
  .theme-toggle button{flex:1;padding:11px;background:transparent;border:none;color:var(--text-secondary);cursor:pointer;font-size:13px;font-weight:600;}
  .theme-toggle button.on{background:var(--accent);color:var(--accent-contrast);}

  #syncStatus{font-size:11px;color:var(--text-secondary);margin-top:10px;}

  .bottom-nav{
    position:fixed;bottom:0;left:0;right:0;z-index:30;
    max-width:520px;margin:0 auto;
    background:var(--nav-bg);border-top:1px solid var(--border);
    display:flex;padding-bottom:env(safe-area-inset-bottom);
  }
  .nav-btn{
    flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;
    background:none;border:none;padding:10px 0 8px;cursor:pointer;color:var(--text-secondary);
  }
  .nav-btn svg{width:22px;height:22px;}
  .nav-btn span{font-size:10.5px;font-weight:600;}
  .nav-btn.active{color:var(--text);}
  .nav-btn.active svg{color:var(--accent);}

  .toast{
    position:fixed;bottom:calc(78px + env(safe-area-inset-bottom));left:50%;transform:translateX(-50%);
    background:var(--accent);color:var(--accent-contrast);padding:9px 18px;border-radius:20px;
    font-size:12.5px;font-weight:700;opacity:0;pointer-events:none;transition:opacity 0.25s;z-index:50;
  }
  .toast.show{opacity:1;}

  .name-popup{
    position:fixed;bottom:calc(78px + env(safe-area-inset-bottom));left:50%;transform:translateX(-50%) translateY(20px);
    background:var(--surface2);border:1px solid var(--border);border-radius:14px;
    padding:14px 16px;display:flex;gap:8px;align-items:center;
    opacity:0;pointer-events:none;transition:opacity 0.2s, transform 0.2s;
    box-shadow:0 8px 24px rgba(0,0,0,0.4);z-index:50;max-width:calc(100vw - 32px);
  }
  .name-popup.show{opacity:1;pointer-events:auto;transform:translateX(-50%) translateY(0);}
  .name-popup input{
    background:var(--input-bg);border:none;color:var(--text);
    padding:9px 10px;border-radius:8px;font-size:13px;font-family:var(--sans);width:160px;
  }
  .name-popup button{border:none;border-radius:20px;padding:9px 14px;font-size:12px;cursor:pointer;font-weight:700;}
  .name-popup .save-btn{background:var(--accent);color:var(--accent-contrast);}
  .name-popup .cancel-btn{background:transparent;color:var(--text-secondary);}
</style>
</head>
<body>
<div class="app-shell">

  <header class="topbar" id="topbarTitle">내 포트폴리오</header>

  <main class="content">

    <section class="tab-pane active" data-pane="home">
      <div class="summary">
        <div class="cell">
          <div class="label">총 평가금액</div>
          <div class="value" id="sumValue">-</div>
        </div>
        <div class="cell">
          <div class="label">총 손익률</div>
          <div class="value" id="sumReturn">-</div>
        </div>
        <div class="cell">
          <div class="label">배당수익률</div>
          <div class="value" id="sumDiv">-</div>
        </div>
      </div>

      <div class="card">
        <p class="card-title">비중 다이얼</p>
        <div id="dialSvgHolder"></div>
        <div class="dial-legend-select">
          <select class="pill" id="dialSortSelect">
            <option value="weight_desc">비중 큰 순</option>
            <option value="return_desc">수익률 높은 순</option>
            <option value="return_asc">수익률 낮은 순</option>
            <option value="alpha">가나다(ABC) 순</option>
          </select>
        </div>
        <table class="dial-table">
          <thead><tr><th>종목</th><th>비중</th><th>수익률</th></tr></thead>
          <tbody id="dialTableBody"></tbody>
        </table>
      </div>

      <div class="card">
        <div class="ledger-head">
          <p class="card-title" style="margin:0;">보유 종목</p>
          <div class="ledger-controls">
            <button class="pill-btn" id="swapNameTickerBtn">코드↔이름</button>
            <select class="pill" id="accountFilter"></select>
            <select class="pill" id="periodSelect">
              <option value="1w">1주</option>
              <option value="1m">1개월</option>
              <option value="3m">3개월</option>
              <option value="1y">1년</option>
              <option value="all" selected>전체</option>
            </select>
          </div>
        </div>
        <div class="table-scroll">
          <table>
            <thead>
              <tr>
                <th>종목</th><th>수량</th><th>평단가</th><th>현재가</th>
                <th>평가금액</th><th>비중</th><th>기간수익률</th><th>배당수익률</th><th></th>
              </tr>
            </thead>
            <tbody id="holdingsBody"></tbody>
          </table>
        </div>
        <div class="empty" id="emptyMsg" style="display:none;">아직 등록된 종목이 없어요. 거래 탭에서 추가해보세요.</div>
      </div>
    </section>

    <section class="tab-pane" data-pane="trade">
      <div class="card ticket">
        <h3>매수 / 매도 기록</h3>
        <div class="row">
          <div class="radio-toggle" style="flex:1;">
            <button type="button" id="btnBuy" class="active-buy">매수</button>
            <button type="button" id="btnSell">매도</button>
          </div>
        </div>
        <div class="row">
          <input type="text" id="txTicker" placeholder="종목코드 (예: AAPL)">
          <input type="text" id="txName" placeholder="종목명 (선택)">
        </div>
        <div class="row">
          <input type="text" id="txAccount" placeholder="계좌명 (예: 미래에셋)" list="accountList">
        </div>
        <div class="row">
          <input type="number" id="txShares" placeholder="수량" min="0" step="any">
          <input type="number" id="txPrice" placeholder="단가" min="0" step="any">
        </div>
        <div class="row">
          <input type="date" id="txDate">
        </div>
        <button class="submit" id="txSubmit">기록 추가</button>
      </div>

      <div class="card ticket">
        <h3>기존 보유 종목 등록</h3>
        <div class="row">
          <input type="text" id="initTicker" placeholder="종목코드 (예: AAPL)">
          <input type="text" id="initName" placeholder="종목명 (선택)">
        </div>
        <div class="row">
          <input type="text" id="initAccount" placeholder="계좌명 (예: 미래에셋)" list="accountList">
        </div>
        <div class="row">
          <input type="number" id="initShares" placeholder="현재 보유수량" min="0" step="any">
          <input type="number" id="initAvgCost" placeholder="평단가(모르면 0)" min="0" step="any">
        </div>
        <div class="row">
          <input type="number" id="initPrice" placeholder="현재가" min="0" step="any">
          <input type="number" id="initDiv" placeholder="연간 배당금(선택)" min="0" step="any">
        </div>
        <button class="submit" id="initSubmit">종목 등록</button>
      </div>

      <datalist id="accountList"></datalist>

      <div class="card">
        <p class="card-title" style="margin:0 0 4px;">거래 내역</p>
        <div id="txList"></div>
      </div>
    </section>

    <section class="tab-pane" data-pane="settings">
      <div class="card">
        <p class="card-title">화면 테마</p>
        <div class="theme-toggle">
          <button type="button" id="themeDarkBtn">다크</button>
          <button type="button" id="themeLightBtn">라이트</button>
        </div>
      </div>

      <div class="card ticket">
        <h3>클라우드 동기화 (Supabase)</h3>
        <div class="row">
          <input type="text" id="syncUrl" placeholder="https://xxxx.supabase.co">
        </div>
        <div class="row">
          <input type="text" id="syncKeyInput" placeholder="anon public key">
        </div>
        <div class="row">
          <input type="text" id="syncPassphrase" placeholder="동기화 키 (본인만의 비밀번호)">
        </div>
        <button class="submit" id="syncSaveBtn">설정 저장 &amp; 동기화</button>
        <div id="syncStatus">동기화 설정 안 됨</div>
        <button class="pill-btn" id="syncNowBtn" style="margin-top:12px;">지금 동기화</button>
      </div>

      <div class="card">
        <p class="card-title">데이터 관리</p>
        <button class="pill-btn" id="resetTxBtn">거래 내역 전체 초기화</button>
      </div>
    </section>

  </main>

  <nav class="bottom-nav">
    <button class="nav-btn active" data-tab="home">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 11l9-8 9 8"/><path d="M5 10v10h5v-6h4v6h5V10"/></svg>
      <span>홈</span>
    </button>
    <button class="nav-btn" data-tab="trade">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 7h14M18 7l-3-3M18 7l-3 3"/><path d="M20 17H6M6 17l3-3M6 17l3 3"/></svg>
      <span>거래</span>
    </button>
    <button class="nav-btn" data-tab="settings">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="4" y1="6" x2="20" y2="6"/><circle cx="9" cy="6" r="2" fill="currentColor" stroke="none"/><line x1="4" y1="12" x2="20" y2="12"/><circle cx="16" cy="12" r="2" fill="currentColor" stroke="none"/><line x1="4" y1="18" x2="20" y2="18"/><circle cx="10" cy="18" r="2" fill="currentColor" stroke="none"/></svg>
      <span>설정</span>
    </button>
  </nav>
</div>

<div class="toast" id="toast"></div>
<div class="name-popup" id="namePopup">
  <input type="text" id="namePopupInput" placeholder="종목명">
  <button class="save-btn" id="namePopupSave">저장</button>
  <button class="cancel-btn" id="namePopupCancel">취소</button>
</div>

<script>
const PALETTE = ['#1DB954','#4CC9F0','#F72585','#FFB703','#9B5DE5','#00BBF9','#F15BB5','#43AA8B'];
let state = { holdings: [], transactions: [] };

const fmt = n => Number(n).toLocaleString('ko-KR', {maximumFractionDigits:2});
const fmtPct = n => (n>0?'+':'') + n.toFixed(2) + '%';
const todayStr = () => new Date().toISOString().slice(0,10);
const cssVar = name => getComputedStyle(document.documentElement).getPropertyValue(name).trim();

document.getElementById('txDate').value = todayStr();

const TAB_TITLES = { home:'내 포트폴리오', trade:'거래', settings:'설정' };
function switchTab(tab){
  document.querySelectorAll('.tab-pane').forEach(p=>p.classList.toggle('active', p.dataset.pane===tab));
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.toggle('active', b.dataset.tab===tab));
  document.getElementById('topbarTitle').textContent = TAB_TITLES[tab] || '내 포트폴리오';
  window.scrollTo(0,0);
}
document.querySelectorAll('.nav-btn').forEach(btn=>{
  btn.addEventListener('click', ()=> switchTab(btn.dataset.tab));
});

function applyTheme(theme){
  document.documentElement.setAttribute('data-theme', theme);
  localStorage.setItem('theme', theme);
  document.getElementById('themeColorMeta').content = theme==='light' ? '#FFFFFF' : '#121212';
  document.getElementById('themeDarkBtn').classList.toggle('on', theme==='dark');
  document.getElementById('themeLightBtn').classList.toggle('on', theme==='light');
  render();
}
document.getElementById('themeDarkBtn').addEventListener('click', ()=>applyTheme('dark'));
document.getElementById('themeLightBtn').addEventListener('click', ()=>applyTheme('light'));
(function initTheme(){
  const saved = localStorage.getItem('theme') || 'dark';
  document.documentElement.setAttribute('data-theme', saved);
  document.getElementById('themeColorMeta').content = saved==='light' ? '#FFFFFF' : '#121212';
  document.getElementById('themeDarkBtn').classList.toggle('on', saved==='dark');
  document.getElementById('themeLightBtn').classList.toggle('on', saved==='light');
})();

function snapshotOf(s){ return JSON.stringify({holdings:s.holdings||[], transactions:s.transactions||[]}); }
let lastSnapshot = null;

async function loadState(){
  try{
    if(window.storage){
      const res = await window.storage.get('portfolio-data');
      if(res && res.value){ state = JSON.parse(res.value); lastSnapshot = snapshotOf(state); render(); return; }
    }
  }catch(e){ }
  try{
    const raw = localStorage.getItem('portfolio-data');
    if(raw){ state = JSON.parse(raw); }
  }catch(e){ }
  lastSnapshot = snapshotOf(state);
  render();
}
async function saveState(){
  const snap = snapshotOf(state);
  const changed = snap !== lastSnapshot;
  if(changed){
    state.meta = state.meta || {};
    state.meta.updatedAt = new Date().toISOString();
    lastSnapshot = snap;
  }
  try{
    if(window.storage){
      await window.storage.set('portfolio-data', JSON.stringify(state));
      if(changed) schedulePush();
      return;
    }
  }catch(e){ }
  try{ localStorage.setItem('portfolio-data', JSON.stringify(state)); }
  catch(e){ showToast('저장 중 문제가 발생했어요'); }
  if(changed) schedulePush();
}

function getSyncConfig(){
  try{ return JSON.parse(localStorage.getItem('portfolio-sync-config') || 'null'); }
  catch(e){ return null; }
}
function saveSyncConfig(cfg){
  localStorage.setItem('portfolio-sync-config', JSON.stringify(cfg));
}
function setSyncStatus(text){
  const el = document.getElementById('syncStatus');
  if(el) el.textContent = text;
}
async function pullFromCloud(cfg){
  const res = await fetch(`${cfg.url}/rest/v1/portfolio_sync?sync_key=eq.${encodeURIComponent(cfg.syncKey)}&select=data,updated_at`, {
    headers:{ apikey: cfg.key, Authorization:`Bearer ${cfg.key}` }
  });
  if(!res.ok) throw new Error('pull failed');
  const rows = await res.json();
  return rows[0] || null;
}
async function pushToCloud(cfg, dataObj){
  const res = await fetch(`${cfg.url}/rest/v1/portfolio_sync`, {
    method:'POST',
    headers:{
      apikey: cfg.key,
      Authorization:`Bearer ${cfg.key}`,
      'Content-Type':'application/json',
      Prefer:'resolution=merge-duplicates,return=minimal'
    },
    body: JSON.stringify({ sync_key: cfg.syncKey, data: dataObj, updated_at: new Date().toISOString() })
  });
  if(!res.ok) throw new Error('push failed');
}
let pushTimer = null;
function schedulePush(){
  const cfg = getSyncConfig();
  if(!cfg) return;
  clearTimeout(pushTimer);
  pushTimer = setTimeout(async ()=>{
    try{
      await pushToCloud(cfg, state);
      setSyncStatus('마지막 동기화: ' + new Date().toLocaleString('ko-KR'));
    }catch(e){
      setSyncStatus('클라우드 업로드 실패 — 설정을 확인해주세요');
    }
  }, 1200);
}
async function syncNow(showMsg){
  const cfg = getSyncConfig();
  if(!cfg || !cfg.url || !cfg.key || !cfg.syncKey){
    if(showMsg) showToast('동기화 설정을 먼저 입력해주세요');
    return;
  }
  try{
    const remote = await pullFromCloud(cfg);
    const localTime = state.meta?.updatedAt ? new Date(state.meta.updatedAt).getTime() : 0;
    const remoteTime = remote?.updated_at ? new Date(remote.updated_at).getTime() : 0;
    if(remote && remoteTime > localTime){
      state = remote.data;
      lastSnapshot = snapshotOf(state);
      try{
        if(window.storage) await window.storage.set('portfolio-data', JSON.stringify(state));
        else localStorage.setItem('portfolio-data', JSON.stringify(state));
      }catch(e){}
      render();
      if(showMsg) showToast('클라우드에서 최신 데이터를 가져왔어요');
    } else {
      await pushToCloud(cfg, state);
      if(showMsg) showToast('클라우드로 업로드했어요');
    }
    setSyncStatus('마지막 동기화: ' + new Date().toLocaleString('ko-KR'));
  }catch(e){
    if(showMsg) showToast('동기화에 실패했어요. URL과 키를 확인해주세요');
    setSyncStatus('동기화 실패');
  }
}

function showToast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), 1800);
}

function holdingId(account, ticker){ return account+'__'+ticker.toUpperCase(); }

function findHolding(ticker, account){
  const t = ticker.toUpperCase();
  if(account){
    return state.holdings.find(h=>h.ticker.toUpperCase()===t && h.account===account);
  }
  return state.holdings.find(h=>h.ticker.toUpperCase()===t);
}

function getAccounts(){
  return [...new Set(state.holdings.map(h=>h.account||'기본'))];
}

function addTransaction(type, ticker, name, account, shares, price, date){
  ticker = ticker.trim().toUpperCase();
  account = (account||'').trim() || '기본';
  shares = Number(shares); price = Number(price);
  if(!ticker || !shares || !price || shares<=0 || price<=0){
    showToast('종목코드·수량·단가를 확인해주세요'); return false;
  }
  let h = findHolding(ticker, account);
  if(type==='buy'){
    if(!h){
      h = {ticker, name:name||ticker, account, shares:0, avgCost:0, currentPrice:price, divAnnual:0, priceHistory:[]};
      state.holdings.push(h);
    }
    const totalCost = h.avgCost*h.shares + price*shares;
    h.shares += shares;
    h.avgCost = totalCost / h.shares;
    h.currentPrice = price;
    h.priceHistory.push({date, price});
    if(name) h.name = name;
  } else {
    if(!h || h.shares < shares){
      showToast('매도 가능한 보유 수량을 초과했어요'); return false;
    }
    h.shares -= shares;
    h.currentPrice = price;
    h.priceHistory.push({date, price});
    if(h.shares <= 0){
      state.holdings = state.holdings.filter(x=>x!==h);
    }
  }
  state.transactions.unshift({id:Date.now(), type, ticker, account, shares, price, date});
  return true;
}

function periodToDays(p){
  return {'1w':7,'1m':30,'3m':90,'1y':365}[p] || null;
}

function periodReturn(h, period){
  if(period==='all'){
    if(!h.avgCost) return null;
    return (h.currentPrice - h.avgCost)/h.avgCost*100;
  }
  const days = periodToDays(period);
  const targetTime = Date.now() - days*86400000;
  let candidates = h.priceHistory.filter(p=>new Date(p.date).getTime() <= targetTime);
  let basePrice;
  if(candidates.length){
    candidates.sort((a,b)=> new Date(b.date)-new Date(a.date));
    basePrice = candidates[0].price;
  } else if(h.priceHistory.length){
    let earliest = [...h.priceHistory].sort((a,b)=>new Date(a.date)-new Date(b.date))[0];
    basePrice = earliest.price;
  } else {
    basePrice = h.avgCost;
  }
  if(!basePrice) return null;
  return (h.currentPrice - basePrice)/basePrice*100;
}

function render(){
  renderAccountFilter();
  const filter = document.getElementById('accountFilter').value || 'ALL';
  const visible = filter==='ALL' ? state.holdings : state.holdings.filter(h=>(h.account||'기본')===filter);

  const totalValue = visible.reduce((s,h)=>s+h.shares*h.currentPrice,0);
  const totalCost = visible.reduce((s,h)=>s+h.shares*h.avgCost,0);
  const totalReturn = totalCost>0 ? (totalValue-totalCost)/totalCost*100 : 0;
  const totalDivIncome = visible.reduce((s,h)=>s+h.shares*(h.divAnnual||0),0);
  const divYield = totalValue>0 ? totalDivIncome/totalValue*100 : 0;

  document.getElementById('sumValue').textContent = totalValue>0 ? fmt(totalValue) : '-';
  const rEl = document.getElementById('sumReturn');
  rEl.textContent = visible.length ? fmtPct(totalReturn) : '-';
  rEl.className = 'value ' + (totalReturn>=0?'up':'down');
  document.getElementById('sumDiv').textContent = visible.length ? divYield.toFixed(2)+'%' : '-';

  const colorMap = renderDial(visible, totalValue);
  renderDialTable(visible, totalValue, colorMap);
  renderTable(visible, totalValue, filter);
  renderTxLog();
  renderAccountDatalist();
  saveState();
}

function renderDial(visible, totalValue){
  const holder = document.getElementById('dialSvgHolder');
  const size = 260, cx=130, cy=130, rOuter=104, rInner=68;
  const borderColor = cssVar('--border') || '#2A2A2A';
  const textColor = cssVar('--text') || '#FFFFFF';
  const mutedColor = cssVar('--text-secondary') || '#B3B3B3';
  let svg = `<svg width="100%" viewBox="0 0 ${size} ${size}">`;
  const colorMap = {};

  for(let i=0;i<72;i++){
    const ang = (i/72)*2*Math.PI - Math.PI/2;
    const len = i%18===0 ? 10 : (i%9===0?6:3);
    const x1 = cx+(rOuter+4)*Math.cos(ang), y1=cy+(rOuter+4)*Math.sin(ang);
    const x2 = cx+(rOuter+4+len)*Math.cos(ang), y2=cy+(rOuter+4+len)*Math.sin(ang);
    svg += `<line x1="${x1}" y1="${y1}" x2="${x2}" y2="${y2}" stroke="${borderColor}" stroke-width="1"/>`;
  }

  if(totalValue>0){
    let start = -Math.PI/2;
    visible.forEach((h,i)=>{
      const val = h.shares*h.currentPrice;
      const frac = val/totalValue;
      const end = start + frac*2*Math.PI;
      const large = (end-start) > Math.PI ? 1:0;
      const x1o=cx+rOuter*Math.cos(start), y1o=cy+rOuter*Math.sin(start);
      const x2o=cx+rOuter*Math.cos(end), y2o=cy+rOuter*Math.sin(end);
      const x1i=cx+rInner*Math.cos(end), y1i=cy+rInner*Math.sin(end);
      const x2i=cx+rInner*Math.cos(start), y2i=cy+rInner*Math.sin(start);
      const color = PALETTE[i%PALETTE.length];
      colorMap[holdingId(h.account,h.ticker)] = color;
      svg += `<path d="M${x1o},${y1o} A${rOuter},${rOuter} 0 ${large} 1 ${x2o},${y2o} L${x1i},${y1i} A${rInner},${rInner} 0 ${large} 0 ${x2i},${y2i} Z" fill="${color}"><title>${h.name||h.ticker} ${ (frac*100).toFixed(1) }%</title></path>`;
      start = end;
    });
  } else {
    svg += `<circle cx="${cx}" cy="${cy}" r="${(rOuter+rInner)/2}" fill="none" stroke="${borderColor}" stroke-width="${rOuter-rInner}"/>`;
  }

  svg += `<text x="${cx}" y="${cy-4}" text-anchor="middle" font-family="ui-monospace,Menlo,Consolas,monospace" font-size="17" font-weight="700" fill="${textColor}">${totalValue>0?fmt(totalValue):'0'}</text>`;
  svg += `<text x="${cx}" y="${cy+16}" text-anchor="middle" font-family="-apple-system,sans-serif" font-size="10" fill="${mutedColor}" letter-spacing="1">TOTAL</text>`;
  svg += `</svg>`;
  holder.innerHTML = svg;
  return colorMap;
}

function renderDialTable(visible, totalValue, colorMap){
  const body = document.getElementById('dialTableBody');
  const period = document.getElementById('periodSelect').value;
  const sortMode = document.getElementById('dialSortSelect').value;
  const showAccount = getAccounts().length>1;

  const rows = visible.map(h=>{
    const value = h.shares*h.currentPrice;
    const weight = totalValue>0 ? value/totalValue*100 : 0;
    const ret = periodReturn(h, period);
    return {h, value, weight, ret};
  });

  rows.sort((a,b)=>{
    if(sortMode==='weight_desc') return b.weight-a.weight;
    if(sortMode==='return_desc') return (b.ret??-Infinity)-(a.ret??-Infinity);
    if(sortMode==='return_asc') return (a.ret??Infinity)-(b.ret??Infinity);
    if(sortMode==='alpha') return (a.h.name||a.h.ticker).localeCompare(b.h.name||b.h.ticker);
    return 0;
  });

  if(!rows.length){
    body.innerHTML = `<tr><td colspan="3" style="color:var(--text-secondary);font-family:var(--sans);text-align:center;padding:14px 0;">보유 종목이 없어요</td></tr>`;
    return;
  }

  body.innerHTML = rows.map(r=>{
    const color = colorMap[holdingId(r.h.account, r.h.ticker)] || '#8B9198';
    const label = showAccount ? `${r.h.name||r.h.ticker} · ${r.h.account||'기본'}` : (r.h.name||r.h.ticker);
    return `<tr>
      <td><span class="tname"><span class="swatch" style="background:${color}"></span><span class="tname-label">${label}</span></span></td>
      <td>${r.weight.toFixed(1)}%</td>
      <td class="${r.ret>=0?'up':'down'}">${r.ret===null?'-':fmtPct(r.ret)}</td>
    </tr>`;
  }).join('');
}

function renderTable(visible, totalValue, filter){
  const body = document.getElementById('holdingsBody');
  const period = document.getElementById('periodSelect').value;
  body.innerHTML = '';
  document.getElementById('emptyMsg').style.display = visible.length ? 'none':'block';

  function renderRow(h){
    const value = h.shares*h.currentPrice;
    const weight = totalValue>0 ? value/totalValue*100 : 0;
    const ret = periodReturn(h, period);
    const divY = h.currentPrice>0 ? (h.divAnnual||0)/h.currentPrice*100 : 0;
    const id = holdingId(h.account,h.ticker);
    const tr = document.createElement('tr');
    tr.innerHTML = `
      <td class="ticker-cell">${h.name || h.ticker}<span class="name">${h.name && h.name!==h.ticker ? h.ticker : ''}</span><button class="edit-name-btn" data-id="${id}" title="종목명 수정">✎</button></td>
      <td><input class="price-input edit-input" type="number" step="any" value="${h.shares}" data-id="${id}" data-field="shares"></td>
      <td><input class="price-input edit-input" type="number" step="any" value="${h.avgCost}" data-id="${id}" data-field="avgCost"></td>
      <td><input class="price-input edit-input" type="number" step="any" value="${h.currentPrice}" data-id="${id}" data-field="currentPrice"></td>
      <td>${fmt(value)}</td>
      <td>${weight.toFixed(1)}%</td>
      <td class="${ret>=0?'up':'down'}">${ret===null?'-':fmtPct(ret)}</td>
      <td>
        <input class="price-input edit-input" type="number" step="any" value="${h.divAnnual||0}" data-id="${id}" data-field="divAnnual" title="연간 배당금(주당)">
        <span style="display:block;font-size:10px;color:var(--text-secondary);margin-top:2px;">${divY.toFixed(2)}%</span>
      </td>
      <td><button class="del-btn" data-id="${id}">삭제</button></td>
    `;
    body.appendChild(tr);
  }

  if(filter==='ALL' && getAccounts().length>1){
    const groups = {};
    visible.forEach(h=>{ const a=h.account||'기본'; (groups[a]=groups[a]||[]).push(h); });
    Object.keys(groups).sort().forEach(acc=>{
      const list = groups[acc];
      const groupValue = list.reduce((s,h)=>s+h.shares*h.currentPrice,0);
      const headerTr = document.createElement('tr');
      headerTr.innerHTML = `<td colspan="9" style="text-align:left;font-family:var(--sans);font-weight:700;color:var(--text-secondary);background:var(--surface2);padding-top:12px;">${acc} <span style="font-weight:400;font-family:var(--mono);">· ${fmt(groupValue)}</span></td>`;
      body.appendChild(headerTr);
      list.sort((a,b)=>(b.shares*b.currentPrice)-(a.shares*a.currentPrice)).forEach(renderRow);
    });
  } else {
    visible.slice().sort((a,b)=>(b.shares*b.currentPrice)-(a.shares*a.currentPrice)).forEach(renderRow);
  }

  body.querySelectorAll('.edit-input').forEach(inp=>{
    inp.addEventListener('change', e=>{
      const h = state.holdings.find(x=>holdingId(x.account,x.ticker)===e.target.dataset.id);
      const field = e.target.dataset.field;
      const val = Number(e.target.value);
      if(!h || isNaN(val)) return;
      if((field==='shares' || field==='currentPrice') && val<=0){
        showToast('수량과 현재가는 0보다 커야 해요');
        render();
        return;
      }
      h[field] = val;
      if(field==='currentPrice'){
        h.priceHistory.push({date: todayStr(), price: val});
      }
      render();
    });
  });
  body.querySelectorAll('.del-btn').forEach(btn=>{
    btn.addEventListener('click', e=>{
      state.holdings = state.holdings.filter(h=>holdingId(h.account,h.ticker)!==e.target.dataset.id);
      render();
    });
  });
  body.querySelectorAll('.edit-name-btn').forEach(btn=>{
    btn.addEventListener('click', e=>{
      const h = state.holdings.find(x=>holdingId(x.account,x.ticker)===e.target.dataset.id);
      if(h) openNamePopup(h);
    });
  });
}

    document.getElementById('syncKeyInput').value = cfg.key || '';
    document.getElementById('syncPassphrase').value = cfg.syncKey || '';
    setSyncStatus('동기화 설정됨 — 불러오는 중...');
  }
})();

document.getElementById('syncSaveBtn').addEventListener('click', async ()=>{
  const url = document.getElementById('syncUrl').value.trim().replace(/\/$/,'');
  const key = document.getElementById('syncKeyInput').value.trim();
  const syncKey = document.getElementById('syncPassphrase').value.trim();
  if(!url || !key || !syncKey){
    showToast('URL, key, 동기화 키를 모두 입력해주세요'); return;
  }
  saveSyncConfig({url, key, syncKey});
  showToast('동기화 설정을 저장했어요');
  await syncNow(true);
});

document.getElementById('syncNowBtn').addEventListener('click', ()=> syncNow(true));

if('serviceWorker' in navigator){
  window.addEventListener('load', ()=>{
    navigator.serviceWorker.register('sw.js').catch(()=>{});
  });
}

loadState().then(()=>{
  const cfg = getSyncConfig();
  if(cfg) syncNow(false);
});
</script>
</body>
</html>

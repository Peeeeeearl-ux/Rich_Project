<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#12181C">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<title>내 포트폴리오 원장</title>
<style>
  :root{
    --bg:#12181C;
    --surface:#1B2329;
    --paper:#F4EFE4;
    --paper-line:#DCD3BC;
    --ink:#22282C;
    --ink-soft:#5B5347;
    --gold:#C7A24C;
    --gold-soft:#E4CD8E;
    --gain:#3F8F5F;
    --loss:#C1443C;
    --muted:#8B9198;
    --serif: Georgia, "Iowan Old Style", "Palatino Linotype", "Nanum Myeongjo", serif;
    --sans: -apple-system, BlinkMacSystemFont, "Segoe UI", "Apple SD Gothic Neo", "Malgun Gothic", sans-serif;
    --mono: ui-monospace, "SF Mono", "Cascadia Code", Menlo, Consolas, monospace;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    background:var(--bg);
    color:var(--paper);
    font-family:var(--sans);
    padding:28px 20px 60px;
    min-height:100vh;
  }
  .wrap{max-width:1080px;margin:0 auto;}

  /* Masthead */
  .masthead{
    display:flex;justify-content:space-between;align-items:flex-end;
    border-bottom:2px solid var(--gold);
    padding-bottom:14px;margin-bottom:22px;
    flex-wrap:wrap;gap:10px;
  }
  .masthead h1{
    font-family:var(--serif);
    font-weight:400;
    font-size:28px;
    letter-spacing:0.5px;
    margin:0;
    color:var(--paper);
  }
  .masthead .date{
    font-family:var(--mono);
    font-size:12px;
    color:var(--muted);
    letter-spacing:1px;
  }

  /* Summary strip */
  .summary{
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:1px;
    background:var(--gold);
    margin-bottom:24px;
    border-radius:2px;
    overflow:hidden;
  }
  .summary .cell{
    background:var(--surface);
    padding:16px 18px;
  }
  .summary .label{
    font-size:11px;color:var(--muted);letter-spacing:1.5px;text-transform:uppercase;margin-bottom:6px;
  }
  .summary .value{
    font-family:var(--mono);font-size:22px;color:var(--paper);
  }
  .summary .value.gain{color:var(--gold-soft);}
  .up{color:var(--gain);} .down{color:var(--loss);}
  @media (max-width:480px){
    .summary{grid-template-columns:1fr;}
    body{padding:20px 12px 60px;}
    .masthead h1{font-size:22px;}
    .name-popup{max-width:calc(100vw - 24px);flex-wrap:wrap;justify-content:center;}
    .name-popup input{width:100%;}
  }

  /* Main grid */
  .main{display:grid;grid-template-columns:320px 1fr;gap:20px;align-items:start;}
  @media (max-width:820px){.main{grid-template-columns:1fr;}}

  /* Dial */
  .dial-card{
    background:var(--surface);
    border-radius:6px;
    padding:20px;
  }
  .dial-title{font-family:var(--serif);font-size:15px;color:var(--gold-soft);margin:0 0 14px;}
  .dial-legend{margin-top:14px;display:flex;flex-direction:column;gap:6px;font-size:12px;}
  .legend-row{display:flex;align-items:center;gap:8px;color:var(--paper);}
  .swatch{width:9px;height:9px;border-radius:1px;flex-shrink:0;}
  .legend-row .pct{margin-left:auto;font-family:var(--mono);color:var(--muted);}
  .dial-table{width:100%;border-collapse:collapse;font-size:12px;margin-top:8px;}
  .dial-table thead th{
    text-align:right;font-weight:400;color:var(--muted);font-size:10px;
    letter-spacing:0.5px;text-transform:uppercase;padding:4px 2px;
    border-bottom:1px solid #2C363C;
  }
  .dial-table thead th:first-child, .dial-table tbody td:first-child{text-align:left;}
  .dial-table tbody td{
    padding:6px 2px;text-align:right;font-family:var(--mono);color:var(--paper);
    border-bottom:1px dashed #2C363C;
  }
  .dial-table .tname{display:flex;align-items:center;gap:6px;font-family:var(--sans);}

  /* Ledger (paper panel) */
  .ledger{
    background:var(--paper);
    color:var(--ink);
    border-radius:6px;
    padding:4px 20px 18px;
  }
  .ledger h2{
    font-family:var(--serif);font-weight:400;font-size:16px;
    border-bottom:1px solid var(--paper-line);
    padding:14px 0 10px;margin:0 0 4px;
    display:flex;justify-content:space-between;align-items:center;
  }
  select.period{
    font-family:var(--sans);font-size:12px;background:transparent;border:1px solid var(--ink-soft);
    color:var(--ink);border-radius:3px;padding:4px 6px;
  }
  .table-scroll{overflow-x:auto;-webkit-overflow-scrolling:touch;}
  table{width:100%;border-collapse:collapse;font-size:13px;min-width:640px;}
  thead th{
    text-align:right;font-weight:400;color:var(--ink-soft);font-size:11px;
    letter-spacing:0.5px;text-transform:uppercase;padding:6px 4px;
    border-bottom:1px solid var(--paper-line);
  }
  thead th:first-child, tbody td:first-child{text-align:left;}
  tbody td{padding:9px 4px;text-align:right;border-bottom:1px dashed var(--paper-line);font-family:var(--mono);}
  tbody tr:hover{background:rgba(0,0,0,0.03);}
  .ticker-cell{font-family:var(--serif);font-size:14px;position:relative;}
  .ticker-cell .name{display:block;font-family:var(--sans);font-size:11px;color:var(--ink-soft);}
  .edit-name-btn{
    background:none;border:none;cursor:pointer;color:var(--ink-soft);font-size:11px;
    margin-left:6px;padding:0;vertical-align:middle;
  }
  .edit-name-btn:hover{color:var(--gold);}
  input.price-input{
    width:76px;font-family:var(--mono);font-size:13px;text-align:right;
    border:1px solid var(--paper-line);border-radius:3px;padding:3px 5px;background:#fff;
  }
  input.edit-input{width:64px;}
  .del-btn{
    font-family:var(--sans);font-size:11px;color:var(--loss);background:none;border:none;cursor:pointer;padding:0;
  }
  .empty{padding:28px 4px;text-align:center;color:var(--ink-soft);font-size:13px;}

  /* Forms */
  .forms{display:grid;grid-template-columns:1fr 1fr 1fr;gap:20px;margin-top:20px;}
  @media (max-width:1000px){.forms{grid-template-columns:1fr 1fr;}}
  @media (max-width:640px){.forms{grid-template-columns:1fr;}}
  .ticket{
    background:var(--surface);border-radius:6px;padding:18px 18px 20px;
  }
  .ticket h3{font-family:var(--serif);font-size:14px;color:var(--gold-soft);margin:0 0 12px;font-weight:400;}
  .ticket .row{display:flex;gap:8px;margin-bottom:8px;flex-wrap:wrap;}
  .ticket input,.ticket select{
    background:#0F1519;border:1px solid #2C363C;color:var(--paper);
    padding:7px 8px;border-radius:3px;font-size:13px;font-family:var(--sans);flex:1;min-width:70px;
  }
  .ticket input::placeholder{color:var(--muted);}
  .ticket button.submit{
    width:100%;padding:9px;background:var(--gold);border:none;border-radius:3px;
    color:#1B2329;font-weight:600;font-size:13px;cursor:pointer;margin-top:4px;
  }
  .ticket button.submit:hover{background:var(--gold-soft);}
  .radio-toggle{display:flex;gap:0;border:1px solid #2C363C;border-radius:3px;overflow:hidden;}
  .radio-toggle button{
    flex:1;padding:7px;background:#0F1519;border:none;color:var(--muted);cursor:pointer;font-size:13px;
  }
  .radio-toggle button.active-buy{background:var(--gain);color:#fff;}
  .radio-toggle button.active-sell{background:var(--loss);color:#fff;}

  /* Transaction log */
  .txlog{margin-top:20px;background:var(--surface);border-radius:6px;padding:16px 18px;}
  .txlog h3{font-family:var(--serif);font-size:14px;color:var(--gold-soft);margin:0 0 10px;font-weight:400;}
  .tx-row{
    display:flex;justify-content:space-between;font-family:var(--mono);font-size:12px;
    padding:6px 0;border-bottom:1px dashed #2C363C;color:var(--paper);
  }
  .tx-row .tag{
    font-family:var(--sans);font-size:10px;padding:1px 6px;border-radius:8px;margin-right:6px;
  }
  .tag.buy{background:rgba(63,143,95,0.2);color:var(--gain);}
  .tag.sell{background:rgba(193,68,60,0.2);color:var(--loss);}
  .tx-empty{color:var(--muted);font-size:12px;padding:8px 0;}

  .toast{
    position:fixed;bottom:22px;left:50%;transform:translateX(-50%);
    background:var(--gold);color:#1B2329;padding:8px 16px;border-radius:20px;
    font-size:12px;font-weight:600;opacity:0;pointer-events:none;transition:opacity 0.25s;
  }
  .toast.show{opacity:1;}

  .name-popup{
    position:fixed;bottom:22px;left:50%;transform:translateX(-50%) translateY(20px);
    background:var(--surface);border:1px solid var(--gold);border-radius:10px;
    padding:14px 16px;display:flex;gap:8px;align-items:center;
    opacity:0;pointer-events:none;transition:opacity 0.2s, transform 0.2s;
    box-shadow:0 8px 24px rgba(0,0,0,0.4);
  }
  .name-popup.show{opacity:1;pointer-events:auto;transform:translateX(-50%) translateY(0);}
  .name-popup input{
    background:#0F1519;border:1px solid #2C363C;color:var(--paper);
    padding:7px 9px;border-radius:5px;font-size:13px;font-family:var(--sans);width:180px;
  }
  .name-popup button{
    border:none;border-radius:5px;padding:7px 12px;font-size:12px;cursor:pointer;font-weight:600;
  }
  .name-popup .save-btn{background:var(--gold);color:#1B2329;}
  .name-popup .cancel-btn{background:transparent;color:var(--muted);}
</style>
</head>
<body>
<div class="wrap">

  <div class="masthead">
    <h1>내 포트폴리오 원장</h1>
    <div class="date" id="todayLabel"></div>
  </div>

  <div class="summary">
    <div class="cell">
      <div class="label">총 평가금액</div>
      <div class="value" id="sumValue">-</div>
    </div>
    <div class="cell">
      <div class="label">총 평가손익률</div>
      <div class="value gain" id="sumReturn">-</div>
    </div>
    <div class="cell">
      <div class="label">가중 평균 배당수익률</div>
      <div class="value" id="sumDiv">-</div>
    </div>
  </div>

  <div class="main">
    <div class="dial-card">
      <p class="dial-title">비중 다이얼</p>
      <div id="dialSvgHolder"></div>
      <div style="display:flex;justify-content:flex-end;margin-top:14px;">
        <select class="period" id="dialSortSelect">
          <option value="weight_desc">비중 큰 순</option>
          <option value="return_desc">수익률 높은 순</option>
          <option value="return_asc">수익률 낮은 순</option>
          <option value="alpha">가나다(ABC) 순</option>
        </select>
      </div>
      <table class="dial-table">
        <thead>
          <tr><th>종목</th><th>비중</th><th>수익률</th></tr>
        </thead>
        <tbody id="dialTableBody"></tbody>
      </table>
    </div>

    <div class="ledger">
      <h2>
        보유 종목
        <span style="display:flex;gap:8px;align-items:center;">
          <button class="del-btn" id="swapNameTickerBtn" style="font-size:11px;">코드↔이름 교체</button>
          <select class="period" id="accountFilter"></select>
          <select class="period" id="periodSelect">
            <option value="1w">1주 수익률</option>
            <option value="1m">1개월 수익률</option>
            <option value="3m">3개월 수익률</option>
            <option value="1y">1년 수익률</option>
            <option value="all" selected>전체(평단가 대비)</option>
          </select>
        </span>
      </h2>
      <div class="table-scroll">
      <table>
        <thead>
          <tr>
            <th>종목</th>
            <th>수량</th>
            <th>평단가</th>
            <th>현재가</th>
            <th>평가금액</th>
            <th>비중</th>
            <th>기간수익률</th>
            <th>배당수익률</th>
            <th></th>
          </tr>
        </thead>
        <tbody id="holdingsBody"></tbody>
      </table>
      </div>
      <div class="empty" id="emptyMsg" style="display:none;">아직 등록된 종목이 없어요. 아래에서 매수 기록을 추가해보세요.</div>
    </div>
  </div>

  <div class="forms">
    <div class="ticket">
      <h3>매수 / 매도 기록</h3>
      <div class="row">
        <div class="radio-toggle" style="flex:1;">
          <button type="button" id="btnBuy" class="active-buy">매수</button>
          <button type="button" id="btnSell">매도</button>
        </div>
      </div>
      <div class="row">
        <input type="text" id="txTicker" placeholder="종목코드 (예: AAPL)">
        <input type="text" id="txName" placeholder="종목명 (선택)">
      </div>
      <div class="row">
        <input type="text" id="txAccount" placeholder="계좌명 (예: 미래에셋)" list="accountList">
      </div>
      <div class="row">
        <input type="number" id="txShares" placeholder="수량" min="0" step="any">
        <input type="number" id="txPrice" placeholder="단가" min="0" step="any">
      </div>
      <div class="row">
        <input type="date" id="txDate">
      </div>
      <button class="submit" id="txSubmit">기록 추가</button>
    </div>

    <div class="ticket">
      <h3>기존 보유 종목 등록</h3>
      <div class="row">
        <input type="text" id="initTicker" placeholder="종목코드 (예: AAPL)">
        <input type="text" id="initName" placeholder="종목명 (선택)">
      </div>
      <div class="row">
        <input type="text" id="initAccount" placeholder="계좌명 (예: 미래에셋)" list="accountList">
      </div>
      <div class="row">
        <input type="number" id="initShares" placeholder="현재 보유수량" min="0" step="any">
        <input type="number" id="initAvgCost" placeholder="평단가(모르면 0)" min="0" step="any">
      </div>
      <div class="row">
        <input type="number" id="initPrice" placeholder="현재가" min="0" step="any">
        <input type="number" id="initDiv" placeholder="연간 배당금(선택)" min="0" step="any">
      </div>
      <button class="submit" id="initSubmit">종목 등록</button>
    </div>

    <div class="ticket">
      <h3>클라우드 동기화 (Supabase)</h3>
      <div class="row">
        <input type="text" id="syncUrl" placeholder="https://xxxx.supabase.co">
      </div>
      <div class="row">
        <input type="text" id="syncKeyInput" placeholder="anon public key">
      </div>
      <div class="row">
        <input type="text" id="syncPassphrase" placeholder="동기화 키 (본인만의 비밀번호)">
      </div>
      <button class="submit" id="syncSaveBtn">설정 저장 &amp; 동기화</button>
      <div id="syncStatus" style="font-size:11px;color:var(--muted);margin-top:8px;">동기화 설정 안 됨</div>
    </div>

    <datalist id="accountList"></datalist>
  </div>

  <div class="txlog">
    <h3 style="display:flex;justify-content:space-between;align-items:center;">
      거래 내역
      <span style="display:flex;gap:8px;">
        <button class="del-btn" id="syncNowBtn" style="font-size:11px;">지금 동기화</button>
        <button class="del-btn" id="resetTxBtn" style="font-size:11px;">전체 초기화</button>
      </span>
    </h3>
    <div id="txList"></div>
  </div>

</div>
<div class="toast" id="toast"></div>
<div class="name-popup" id="namePopup">
  <input type="text" id="namePopupInput" placeholder="종목명">
  <button class="save-btn" id="namePopupSave">저장</button>
  <button class="cancel-btn" id="namePopupCancel">취소</button>
</div>

<script>
const PALETTE = ['#C7A24C','#7EA88C','#B25D5D','#6E88A8','#C99B5A','#8E7CB0','#A3A05C','#5B8F8F'];
let state = { holdings: [], transactions: [] };

const fmt = n => Number(n).toLocaleString('ko-KR', {maximumFractionDigits:2});
const fmtPct = n => (n>0?'+':'') + n.toFixed(2) + '%';
const todayStr = () => new Date().toISOString().slice(0,10);

document.getElementById('todayLabel').textContent = todayStr().replace(/-/g,'.');
document.getElementById('txDate').value = todayStr();

function snapshotOf(s){ return JSON.stringify({holdings:s.holdings||[], transactions:s.transactions||[]}); }
let lastSnapshot = null;

async function loadState(){
  try{
    if(window.storage){
      const res = await window.storage.get('portfolio-data');
      if(res && res.value){ state = JSON.parse(res.value); lastSnapshot = snapshotOf(state); render(); return; }
    }
  }catch(e){ /* Claude 저장소 없음 */ }
  try{
    const raw = localStorage.getItem('portfolio-data');
    if(raw){ state = JSON.parse(raw); }
  }catch(e){ /* 저장된 데이터 없음 */ }
  lastSnapshot = snapshotOf(state);
  render();
}
async function saveState(){
  const snap = snapshotOf(state);
  const changed = snap !== lastSnapshot;
  if(changed){
    state.meta = state.meta || {};
    state.meta.updatedAt = new Date().toISOString();
    lastSnapshot = snap;
  }
  try{
    if(window.storage){
      await window.storage.set('portfolio-data', JSON.stringify(state));
      if(changed) schedulePush();
      return;
    }
  }catch(e){ /* Claude 저장소 없음 */ }
  try{ localStorage.setItem('portfolio-data', JSON.stringify(state)); }
  catch(e){ showToast('저장 중 문제가 발생했어요'); }
  if(changed) schedulePush();
}

/* ---- Supabase 클라우드 동기화 ---- */
function getSyncConfig(){
  try{ return JSON.parse(localStorage.getItem('portfolio-sync-config') || 'null'); }
  catch(e){ return null; }
}
function saveSyncConfig(cfg){
  localStorage.setItem('portfolio-sync-config', JSON.stringify(cfg));
}
function setSyncStatus(text){
  const el = document.getElementById('syncStatus');
  if(el) el.textContent = text;
}
async function pullFromCloud(cfg){
  const res = await fetch(`${cfg.url}/rest/v1/portfolio_sync?sync_key=eq.${encodeURIComponent(cfg.syncKey)}&select=data,updated_at`, {
    headers:{ apikey: cfg.key, Authorization:`Bearer ${cfg.key}` }
  });
  if(!res.ok) throw new Error('pull failed');
  const rows = await res.json();
  return rows[0] || null;
}
async function pushToCloud(cfg, dataObj){
  const res = await fetch(`${cfg.url}/rest/v1/portfolio_sync`, {
    method:'POST',
    headers:{
      apikey: cfg.key,
      Authorization:`Bearer ${cfg.key}`,
      'Content-Type':'application/json',
      Prefer:'resolution=merge-duplicates,return=minimal'
    },
    body: JSON.stringify({ sync_key: cfg.syncKey, data: dataObj, updated_at: new Date().toISOString() })
  });
  if(!res.ok) throw new Error('push failed');
}
let pushTimer = null;
function schedulePush(){
  const cfg = getSyncConfig();
  if(!cfg) return;
  clearTimeout(pushTimer);
  pushTimer = setTimeout(async ()=>{
    try{
      await pushToCloud(cfg, state);
      setSyncStatus('마지막 동기화: ' + new Date().toLocaleString('ko-KR'));
    }catch(e){
      setSyncStatus('클라우드 업로드 실패 — 설정을 확인해주세요');
    }
  }, 1200);
}
async function syncNow(showMsg){
  const cfg = getSyncConfig();
  if(!cfg || !cfg.url || !cfg.key || !cfg.syncKey){
    if(showMsg) showToast('동기화 설정을 먼저 입력해주세요');
    return;
  }
  try{
    const remote = await pullFromCloud(cfg);
    const localTime = state.meta?.updatedAt ? new Date(state.meta.updatedAt).getTime() : 0;
    const remoteTime = remote?.updated_at ? new Date(remote.updated_at).getTime() : 0;
    if(remote && remoteTime > localTime){
      state = remote.data;
      lastSnapshot = snapshotOf(state);
      try{
        if(window.storage) await window.storage.set('portfolio-data', JSON.stringify(state));
        else localStorage.setItem('portfolio-data', JSON.stringify(state));
      }catch(e){}
      render();
      if(showMsg) showToast('클라우드에서 최신 데이터를 가져왔어요');
    } else {
      await pushToCloud(cfg, state);
      if(showMsg) showToast('클라우드로 업로드했어요');
    }
    setSyncStatus('마지막 동기화: ' + new Date().toLocaleString('ko-KR'));
  }catch(e){
    if(showMsg) showToast('동기화에 실패했어요. URL과 키를 확인해주세요');
    setSyncStatus('동기화 실패');
  }
}

function showToast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), 1800);
}

function holdingId(account, ticker){ return account+'__'+ticker.toUpperCase(); }

function findHolding(ticker, account){
  const t = ticker.toUpperCase();
  if(account){
    return state.holdings.find(h=>h.ticker.toUpperCase()===t && h.account===account);
  }
  return state.holdings.find(h=>h.ticker.toUpperCase()===t);
}

function getAccounts(){
  return [...new Set(state.holdings.map(h=>h.account||'기본'))];
}

function addTransaction(type, ticker, name, account, shares, price, date){
  ticker = ticker.trim().toUpperCase();
  account = (account||'').trim() || '기본';
  shares = Number(shares); price = Number(price);
  if(!ticker || !shares || !price || shares<=0 || price<=0){
    showToast('종목코드·수량·단가를 확인해주세요'); return false;
  }
  let h = findHolding(ticker, account);
  if(type==='buy'){
    if(!h){
      h = {ticker, name:name||ticker, account, shares:0, avgCost:0, currentPrice:price, divAnnual:0, priceHistory:[]};
      state.holdings.push(h);
    }
    const totalCost = h.avgCost*h.shares + price*shares;
    h.shares += shares;
    h.avgCost = totalCost / h.shares;
    h.currentPrice = price;
    h.priceHistory.push({date, price});
    if(name) h.name = name;
  } else {
    if(!h || h.shares < shares){
      showToast('매도 가능한 보유 수량을 초과했어요'); return false;
    }
    h.shares -= shares;
    h.currentPrice = price;
    h.priceHistory.push({date, price});
    if(h.shares <= 0){
      state.holdings = state.holdings.filter(x=>x!==h);
    }
  }
  state.transactions.unshift({id:Date.now(), type, ticker, account, shares, price, date});
  return true;
}

function periodToDays(p){
  return {'1w':7,'1m':30,'3m':90,'1y':365}[p] || null;
}

function periodReturn(h, period){
  if(period==='all'){
    if(!h.avgCost) return null;
    return (h.currentPrice - h.avgCost)/h.avgCost*100;
  }
  const days = periodToDays(period);
  const targetTime = Date.now() - days*86400000;
  let candidates = h.priceHistory.filter(p=>new Date(p.date).getTime() <= targetTime);
  let basePrice;
  if(candidates.length){
    candidates.sort((a,b)=> new Date(b.date)-new Date(a.date));
    basePrice = candidates[0].price;
  } else if(h.priceHistory.length){
    let earliest = [...h.priceHistory].sort((a,b)=>new Date(a.date)-new Date(b.date))[0];
    basePrice = earliest.price;
  } else {
    basePrice = h.avgCost;
  }
  if(!basePrice) return null;
  return (h.currentPrice - basePrice)/basePrice*100;
}

function render(){
  renderAccountFilter();
  const filter = document.getElementById('accountFilter').value || 'ALL';
  const visible = filter==='ALL' ? state.holdings : state.holdings.filter(h=>(h.account||'기본')===filter);

  const totalValue = visible.reduce((s,h)=>s+h.shares*h.currentPrice,0);
  const totalCost = visible.reduce((s,h)=>s+h.shares*h.avgCost,0);
  const totalReturn = totalCost>0 ? (totalValue-totalCost)/totalCost*100 : 0;
  const totalDivIncome = visible.reduce((s,h)=>s+h.shares*(h.divAnnual||0),0);
  const divYield = totalValue>0 ? totalDivIncome/totalValue*100 : 0;

  document.getElementById('sumValue').textContent = totalValue>0 ? fmt(totalValue) : '-';
  const rEl = document.getElementById('sumReturn');
  rEl.textContent = visible.length ? fmtPct(totalReturn) : '-';
  rEl.className = 'value ' + (totalReturn>=0?'up':'down');
  document.getElementById('sumDiv').textContent = visible.length ? divYield.toFixed(2)+'%' : '-';

  const colorMap = renderDial(visible, totalValue);
  renderDialTable(visible, totalValue, colorMap);
  renderTable(visible, totalValue, filter);
  renderTxLog();
  renderAccountDatalist();
  saveState();
}

function renderAccountFilter(){
  const sel = document.getElementById('accountFilter');
  const prev = sel.value;
  const accounts = getAccounts();
  sel.innerHTML = `<option value="ALL">전체 계좌</option>` + accounts.map(a=>`<option value="${a}">${a}</option>`).join('');
  if(prev && (prev==='ALL' || accounts.includes(prev))) sel.value = prev;
}

function renderAccountDatalist(){
  const dl = document.getElementById('accountList');
  dl.innerHTML = getAccounts().map(a=>`<option value="${a}">`).join('');
}

function renderDial(visible, totalValue){
  const holder = document.getElementById('dialSvgHolder');
  const size = 260, cx=130, cy=130, rOuter=104, rInner=68;
  let svg = `<svg width="100%" viewBox="0 0 ${size} ${size}">`;
  const colorMap = {};

  // tick marks every 5%
  for(let i=0;i<72;i++){
    const ang = (i/72)*2*Math.PI - Math.PI/2;
    const len = i%18===0 ? 10 : (i%9===0?6:3);
    const x1 = cx+(rOuter+4)*Math.cos(ang), y1=cy+(rOuter+4)*Math.sin(ang);
    const x2 = cx+(rOuter+4+len)*Math.cos(ang), y2=cy+(rOuter+4+len)*Math.sin(ang);
    svg += `<line x1="${x1}" y1="${y1}" x2="${x2}" y2="${y2}" stroke="#3A444B" stroke-width="1"/>`;
  }

  if(totalValue>0){
    let start = -Math.PI/2;
    visible.forEach((h,i)=>{
      const val = h.shares*h.currentPrice;
      const frac = val/totalValue;
      const end = start + frac*2*Math.PI;
      const large = (end-start) > Math.PI ? 1:0;
      const x1o=cx+rOuter*Math.cos(start), y1o=cy+rOuter*Math.sin(start);
      const x2o=cx+rOuter*Math.cos(end), y2o=cy+rOuter*Math.sin(end);
      const x1i=cx+rInner*Math.cos(end), y1i=cy+rInner*Math.sin(end);
      const x2i=cx+rInner*Math.cos(start), y2i=cy+rInner*Math.sin(start);
      const color = PALETTE[i%PALETTE.length];
      colorMap[holdingId(h.account,h.ticker)] = color;
      svg += `<path d="M${x1o},${y1o} A${rOuter},${rOuter} 0 ${large} 1 ${x2o},${y2o} L${x1i},${y1i} A${rInner},${rInner} 0 ${large} 0 ${x2i},${y2i} Z" fill="${color}"><title>${h.name||h.ticker} ${ (frac*100).toFixed(1) }%</title></path>`;
      start = end;
    });
  } else {
    svg += `<circle cx="${cx}" cy="${cy}" r="${(rOuter+rInner)/2}" fill="none" stroke="#3A444B" stroke-width="${rOuter-rInner}"/>`;
  }

  svg += `<text x="${cx}" y="${cy-4}" text-anchor="middle" font-family="ui-monospace,Menlo,Consolas,monospace" font-size="17" fill="#F4EFE4">${totalValue>0?fmt(totalValue):'0'}</text>`;
  svg += `<text x="${cx}" y="${cy+16}" text-anchor="middle" font-family="-apple-system,sans-serif" font-size="10" fill="#8B9198" letter-spacing="1">TOTAL</text>`;
  svg += `</svg>`;
  holder.innerHTML = svg;
  return colorMap;
}

function renderDialTable(visible, totalValue, colorMap){
  const body = document.getElementById('dialTableBody');
  const period = document.getElementById('periodSelect').value;
  const sortMode = document.getElementById('dialSortSelect').value;
  const showAccount = getAccounts().length>1;

  const rows = visible.map(h=>{
    const value = h.shares*h.currentPrice;
    const weight = totalValue>0 ? value/totalValue*100 : 0;
    const ret = periodReturn(h, period);
    return {h, value, weight, ret};
  });

  rows.sort((a,b)=>{
    if(sortMode==='weight_desc') return b.weight-a.weight;
    if(sortMode==='return_desc') return (b.ret??-Infinity)-(a.ret??-Infinity);
    if(sortMode==='return_asc') return (a.ret??Infinity)-(b.ret??Infinity);
    if(sortMode==='alpha') return (a.h.name||a.h.ticker).localeCompare(b.h.name||b.h.ticker);
    return 0;
  });

  if(!rows.length){
    body.innerHTML = `<tr><td colspan="3" style="color:var(--muted);font-family:var(--sans);text-align:center;padding:14px 0;">보유 종목이 없어요</td></tr>`;
    return;
  }

  body.innerHTML = rows.map(r=>{
    const color = colorMap[holdingId(r.h.account, r.h.ticker)] || '#8B9198';
    const label = showAccount ? `${r.h.name||r.h.ticker} · ${r.h.account||'기본'}` : (r.h.name||r.h.ticker);
    return `<tr>
      <td><span class="tname"><span class="swatch" style="background:${color}"></span>${label}</span></td>
      <td>${r.weight.toFixed(1)}%</td>
      <td class="${r.ret>=0?'up':'down'}">${r.ret===null?'-':fmtPct(r.ret)}</td>
    </tr>`;
  }).join('');
}

function renderTable(visible, totalValue, filter){
  const body = document.getElementById('holdingsBody');
  const period = document.getElementById('periodSelect').value;
  body.innerHTML = '';
  document.getElementById('emptyMsg').style.display = visible.length ? 'none':'block';

  function renderRow(h){
    const value = h.shares*h.currentPrice;
    const weight = totalValue>0 ? value/totalValue*100 : 0;
    const ret = periodReturn(h, period);
    const divY = h.currentPrice>0 ? (h.divAnnual||0)/h.currentPrice*100 : 0;
    const id = holdingId(h.account,h.ticker);
    const tr = document.createElement('tr');
    tr.innerHTML = `
      <td class="ticker-cell">${h.name || h.ticker}<span class="name">${h.name && h.name!==h.ticker ? h.ticker : ''}</span><button class="edit-name-btn" data-id="${id}" title="종목명 수정">✎</button></td>
      <td><input class="price-input edit-input" type="number" step="any" value="${h.shares}" data-id="${id}" data-field="shares"></td>
      <td><input class="price-input edit-input" type="number" step="any" value="${h.avgCost}" data-id="${id}" data-field="avgCost"></td>
      <td><input class="price-input edit-input" type="number" step="any" value="${h.currentPrice}" data-id="${id}" data-field="currentPrice"></td>
      <td>${fmt(value)}</td>
      <td>${weight.toFixed(1)}%</td>
      <td class="${ret>=0?'up':'down'}">${ret===null?'-':fmtPct(ret)}</td>
      <td>
        <input class="price-input edit-input" type="number" step="any" value="${h.divAnnual||0}" data-id="${id}" data-field="divAnnual" title="연간 배당금(주당)">
        <span style="display:block;font-size:10px;color:var(--ink-soft);margin-top:2px;">${divY.toFixed(2)}%</span>
      </td>
      <td><button class="del-btn" data-id="${id}">삭제</button></td>
    `;
    body.appendChild(tr);
  }

  if(filter==='ALL' && getAccounts().length>1){
    const groups = {};
    visible.forEach(h=>{ const a=h.account||'기본'; (groups[a]=groups[a]||[]).push(h); });
    Object.keys(groups).sort().forEach(acc=>{
      const list = groups[acc];
      const groupValue = list.reduce((s,h)=>s+h.shares*h.currentPrice,0);
      const headerTr = document.createElement('tr');
      headerTr.innerHTML = `<td colspan="9" style="text-align:left;font-family:var(--sans);font-weight:600;color:var(--ink-soft);background:rgba(0,0,0,0.03);padding-top:12px;">${acc} <span style="font-weight:400;font-family:var(--mono);">· ${fmt(groupValue)}</span></td>`;
      body.appendChild(headerTr);
      list.sort((a,b)=>(b.shares*b.currentPrice)-(a.shares*a.currentPrice)).forEach(renderRow);
    });
  } else {
    visible.slice().sort((a,b)=>(b.shares*b.currentPrice)-(a.shares*a.currentPrice)).forEach(renderRow);
  }

  body.querySelectorAll('.edit-input').forEach(inp=>{
    inp.addEventListener('change', e=>{
      const h = state.holdings.find(x=>holdingId(x.account,x.ticker)===e.target.dataset.id);
      const field = e.target.dataset.field;
      const val = Number(e.target.value);
      if(!h || isNaN(val)) return;
      if((field==='shares' || field==='currentPrice') && val<=0){
        showToast('수량과 현재가는 0보다 커야 해요');
        render();
        return;
      }
      h[field] = val;
      if(field==='currentPrice'){
        h.priceHistory.push({date: todayStr(), price: val});
      }
      render();
    });
  });
  body.querySelectorAll('.del-btn').forEach(btn=>{
    btn.addEventListener('click', e=>{
      state.holdings = state.holdings.filter(h=>holdingId(h.account,h.ticker)!==e.target.dataset.id);
      render();
    });
  });
  body.querySelectorAll('.edit-name-btn').forEach(btn=>{
    btn.addEventListener('click', e=>{
      const h = state.holdings.find(x=>holdingId(x.account,x.ticker)===e.target.dataset.id);
      if(h) openNamePopup(h);
    });
  });
}

function renderTxLog(){
  const list = document.getElementById('txList');
  if(!state.transactions.length){
    list.innerHTML = '<div class="tx-empty">거래 내역이 없어요.</div>'; return;
  }
  const showAccount = getAccounts().length>1;
  list.innerHTML = state.transactions.slice(0,30).map(tx=>`
    <div class="tx-row">
      <span><span class="tag ${tx.type}">${tx.type==='buy'?'매수':'매도'}</span>${tx.ticker}${showAccount?' · '+(tx.account||'기본'):''} ${fmt(tx.shares)}주 @ ${fmt(tx.price)}</span>
      <span>${tx.date}</span>
    </div>
  `).join('');
}

// buy/sell toggle
let txType = 'buy';
document.getElementById('btnBuy').addEventListener('click', ()=>{
  txType='buy';
  document.getElementById('btnBuy').classList.add('active-buy');
  document.getElementById('btnSell').classList.remove('active-sell');
});
document.getElementById('btnSell').addEventListener('click', ()=>{
  txType='sell';
  document.getElementById('btnSell').classList.add('active-sell');
  document.getElementById('btnBuy').classList.remove('active-buy');
});

document.getElementById('txSubmit').addEventListener('click', ()=>{
  const ok = addTransaction(
    txType,
    document.getElementById('txTicker').value,
    document.getElementById('txName').value,
    document.getElementById('txAccount').value,
    document.getElementById('txShares').value,
    document.getElementById('txPrice').value,
    document.getElementById('txDate').value || todayStr()
  );
  if(ok){
    document.getElementById('txTicker').value='';
    document.getElementById('txName').value='';
    document.getElementById('txShares').value='';
    document.getElementById('txPrice').value='';
    showToast(txType==='buy' ? '매수 기록을 추가했어요' : '매도 기록을 추가했어요');
    render();
  }
});

document.getElementById('initSubmit').addEventListener('click', ()=>{
  const ticker = document.getElementById('initTicker').value.trim().toUpperCase();
  const name = document.getElementById('initName').value.trim();
  const account = document.getElementById('initAccount').value.trim() || '기본';
  const shares = Number(document.getElementById('initShares').value);
  const avgCost = Number(document.getElementById('initAvgCost').value) || 0;
  const price = Number(document.getElementById('initPrice').value);
  const div = Number(document.getElementById('initDiv').value) || 0;

  if(!ticker || !shares || shares<=0 || !price || price<=0){
    showToast('종목코드·수량·현재가를 확인해주세요'); return;
  }
  let h = findHolding(ticker, account);
  if(h){
    h.shares = shares;
    h.avgCost = avgCost;
    h.currentPrice = price;
    h.divAnnual = div;
    if(name) h.name = name;
  } else {
    h = {ticker, name: name||ticker, account, shares, avgCost, currentPrice:price, divAnnual:div, priceHistory:[]};
    state.holdings.push(h);
  }
  h.priceHistory.push({date: todayStr(), price});

  document.getElementById('initTicker').value='';
  document.getElementById('initName').value='';
  document.getElementById('initShares').value='';
  document.getElementById('initAvgCost').value='';
  document.getElementById('initPrice').value='';
  document.getElementById('initDiv').value='';
  showToast('보유 종목을 등록했어요');
  render();
});

document.getElementById('periodSelect').addEventListener('change', ()=> render());
document.getElementById('dialSortSelect').addEventListener('change', ()=> render());
document.getElementById('accountFilter').addEventListener('change', ()=> render());
let resetArmed = false;
let resetTimer = null;
document.getElementById('resetTxBtn').addEventListener('click', (e)=>{
  if(!resetArmed){
    resetArmed = true;
    e.target.textContent = '한번 더 누르면 초기화';
    resetTimer = setTimeout(()=>{
      resetArmed = false;
      e.target.textContent = '전체 초기화';
    }, 3000);
    return;
  }
  clearTimeout(resetTimer);
  resetArmed = false;
  e.target.textContent = '전체 초기화';
  state.transactions = [];
  render();
  showToast('거래 내역을 초기화했어요');
});

document.getElementById('swapNameTickerBtn').addEventListener('click', ()=>{
  if(!state.holdings.length){ showToast('교체할 종목이 없어요'); return; }
  const tickerMap = {}; // "account__OLDTICKER" -> newTicker
  state.holdings.forEach(h=>{
    const oldTicker = h.ticker;
    const newTicker = (h.name || h.ticker).trim().toUpperCase();
    const newName = h.ticker;
    tickerMap[holdingId(h.account, oldTicker)] = newTicker;
    h.ticker = newTicker;
    h.name = newName;
  });
  state.transactions.forEach(tx=>{
    const key = holdingId(tx.account, tx.ticker);
    if(tickerMap[key]) tx.ticker = tickerMap[key];
  });
  render();
  showToast('종목코드와 종목명을 맞바꿨어요');
});

let editingHoldingId = null;
function openNamePopup(h){
  editingHoldingId = holdingId(h.account, h.ticker);
  const input = document.getElementById('namePopupInput');
  input.value = h.name || h.ticker;
  document.getElementById('namePopup').classList.add('show');
  input.focus();
  input.select();
}
function closeNamePopup(){
  document.getElementById('namePopup').classList.remove('show');
  editingHoldingId = null;
}
document.getElementById('namePopupSave').addEventListener('click', ()=>{
  const h = state.holdings.find(x=>holdingId(x.account,x.ticker)===editingHoldingId);
  const val = document.getElementById('namePopupInput').value.trim();
  if(h && val){
    h.name = val;
    render();
    showToast('종목명을 수정했어요');
  }
  closeNamePopup();
});
document.getElementById('namePopupCancel').addEventListener('click', closeNamePopup);
document.getElementById('namePopupInput').addEventListener('keydown', e=>{
  if(e.key==='Enter') document.getElementById('namePopupSave').click();
  if(e.key==='Escape') closeNamePopup();
});

(function initSyncUI(){
  const cfg = getSyncConfig();
  if(cfg){
    document.getElementById('syncUrl').value = cfg.url || '';
    document.getElementById('syncKeyInput').value = cfg.key || '';
    document.getElementById('syncPassphrase').value = cfg.syncKey || '';
    setSyncStatus('동기화 설정됨 — 불러오는 중...');
  }
})();

document.getElementById('syncSaveBtn').addEventListener('click', async ()=>{
  const url = document.getElementById('syncUrl').value.trim().replace(/\/$/,'');
  const key = document.getElementById('syncKeyInput').value.trim();
  const syncKey = document.getElementById('syncPassphrase').value.trim();
  if(!url || !key || !syncKey){
    showToast('URL, key, 동기화 키를 모두 입력해주세요'); return;
  }
  saveSyncConfig({url, key, syncKey});
  showToast('동기화 설정을 저장했어요');
  await syncNow(true);
});

document.getElementById('syncNowBtn').addEventListener('click', ()=> syncNow(true));

if('serviceWorker' in navigator){
  window.addEventListener('load', ()=>{
    navigator.serviceWorker.register('sw.js').catch(()=>{});
  });
}

loadState().then(()=>{
  const cfg = getSyncConfig();
  if(cfg) syncNow(false);
});
